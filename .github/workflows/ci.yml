name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        # Lightweight test deps only — the local OCR stack (rapidocr-onnxruntime)
        # is lazy-imported and unit-tested with mocks, so CI doesn't install it.
        run: pip install -r requirements-test.txt

      - name: Syntax check
        run: python -m compileall -q server.py process_receipts.py spreadsheet_theme.py watch_mode.py scheduler.py app_secrets.py docker-entrypoint.py

      - name: Run tests
        run: python -m pytest tests/ -v
