services:
  receipt-processor:
    build: .
    # Relaunch automatically after the in-app "Restart App" button (which exits the
    # process) and after host reboots / crashes. Without this, the restart button
    # stops the container for good and it never comes back online.
    restart: unless-stopped
    ports:
      # Bound to localhost: the app has no login by default, so don't expose it
      # to the whole LAN. Set APP_AUTH_TOKEN and change this to "0.0.0.0:8000:8000"
      # (or remove the 127.0.0.1 prefix) only if you need remote access.
      - "127.0.0.1:8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${INTAKE_PATH:-./intake}:/data/intake
      - ${OUTPUT_PATH:-./output}:/data/output
      - ${EXPORT_PATH:-./export}:/data/export
      # Secrets (SMTP password, Dropbox token) live here — a LOCAL volume, never
      # a cloud-synced folder like OUTPUT_PATH.
      - ./config:/data/config
    environment:
      # Defaults to an external LM Studio on the host. To use the BUNDLED model
      # instead, start with `--profile bundled-llm` and set
      # LMSTUDIO_BASE_URL=http://model-server:11434/v1 (see README "Bundled LLM").
      - LMSTUDIO_BASE_URL=${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      # Optional shared-secret auth. When set, every request must present it
      # (header X-Auth-Token, cookie, or open the page once with ?token=…).
      - APP_AUTH_TOKEN=${APP_AUTH_TOKEN:-}
      - SECRETS_PATH=/data/config/secrets.json
      - RECEIPTS_FOLDER=/data/intake
      - OUTPUT_FOLDER=/data/output
      - EXPORT_FOLDER=/data/export
      - WATCH_INBOX=/data/intake
      - HOST_INTAKE_PATH=${INTAKE_PATH:-${PWD}/intake}
      - HOST_OUTPUT_PATH=${OUTPUT_PATH:-${PWD}/output}
      - HOST_EXPORT_PATH=${EXPORT_PATH:-${PWD}/export}
      # MAX_PARALLEL_REQUESTS=4
      # Scheduled export (also configurable from the web UI Settings card).
      # Point EXPORT_PATH at a Dropbox/Drive/OneDrive sync folder for
      # automatic cloud upload without any API keys.
      - SCHEDULE_ENABLED=${SCHEDULE_ENABLED:-0}
      - SCHEDULE_TIME=${SCHEDULE_TIME:-17:00}
      - SCHEDULE_DAYS=${SCHEDULE_DAYS:-thu}
      - SCHEDULE_EMAIL=${SCHEDULE_EMAIL:-0}
      - SCHEDULE_DROPBOX_TOKEN=${SCHEDULE_DROPBOX_TOKEN:-}
      # Email settings — used by scheduled export and "Send Report Now"
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - EMAIL_TO=${EMAIL_TO:-}
      - EMAIL_SUBJECT=${EMAIL_SUBJECT:-Weekly Reimbursement Report}

  receipt-watcher:
    build: .
    profiles: ["watch"]
    restart: unless-stopped
    command: ["python", "watch_mode.py"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${INTAKE_PATH:-./intake}:/data/watch_inbox
      - ./processing:/data/processing
      - ./failed:/data/failed
      - ${OUTPUT_PATH:-./output}:/data/output
      - ./watch_state:/data/watch_state
      - ./config:/data/config   # shared secrets store (local, non-synced)
    environment:
      - LMSTUDIO_BASE_URL=http://host.docker.internal:1234/v1
      - SECRETS_PATH=/data/config/secrets.json
      - WATCH_INBOX=/data/watch_inbox
      - WATCH_STAGED=/data/processing
      - WATCH_STATE=/data/watch_state
      - OUTPUT_FOLDER=/data/output
      - HOST_OUTPUT_PATH=${OUTPUT_PATH:-${PWD}/output}
      - WATCH_INTERVAL=60
      - WATCH_EMPLOYEE_NAME=Duane Hamilton
      #MAX_PARALLEL_REQUESTS=4
      # Email settings — fill in to enable "Send Report Now"
      - SMTP_HOST=
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASS=
      - SMTP_FROM=
      - EMAIL_TO=
      - EMAIL_SUBJECT=Weekly Reimbursement Report

  # ── Bundled local LLM (optional) ────────────────────────────────────────────
  # Serves an OpenAI-compatible API so the app needs NO external LM Studio. The
  # model weights are baked into the image (offline at runtime; the image is
  # ~2-3 GB for a 2B vision model). Opt in with the "bundled-llm" profile:
  #
  #   LMSTUDIO_BASE_URL=http://model-server:11434/v1 \
  #     docker compose --profile bundled-llm up --build
  #
  # Swap the model via build args (see Dockerfile.model). A vision model is
  # recommended so the direct-image path + LLM spatial boxes work.
  model-server:
    profiles: ["bundled-llm"]
    build:
      context: .
      dockerfile: Dockerfile.model
      args:
        MODEL_URL: ${MODEL_URL:-}
        MMPROJ_URL: ${MMPROJ_URL:-}
    restart: unless-stopped
    # Exposed on localhost too, so the model is reachable from a host LM Studio
    # client / curl for debugging. The app talks to it over the compose network.
    ports:
      - "127.0.0.1:11434:11434"
    # GPU offload is opt-in (host needs the NVIDIA container toolkit). CPU-only
    # works out of the box; uncomment to accelerate:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: ["gpu"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:11434/v1/models"]
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 5
