services:
  receipt-processor:
    build: .
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./intake:/data/intake
      - ./output:/data/output
    environment:
      - LMSTUDIO_BASE_URL=http://host.docker.internal:1234/v1
      - RECEIPTS_FOLDER=/data/intake
      - OUTPUT_FOLDER=/data/output
      - WATCH_INBOX=/data/intake
      # Host-side paths resolve automatically from the directory you run docker-compose in
      - HOST_OUTPUT_PATH=${PWD}/output
      - HOST_INTAKE_PATH=${PWD}/intake
      - MAX_PARALLEL_REQUESTS=4

  receipt-watcher:
    build: .
    profiles: ["watch"]
    command: ["python", "watch_mode.py"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./intake:/data/watch_inbox
      - ./processing:/data/processing
      - ./failed:/data/failed
      - ./output:/data/output
      - ./watch_state:/data/watch_state
    environment:
      - LMSTUDIO_BASE_URL=http://host.docker.internal:1234/v1
      - WATCH_INBOX=/data/watch_inbox
      - WATCH_STAGED=/data/processing
      - WATCH_STATE=/data/watch_state
      - OUTPUT_FOLDER=/data/output
      - HOST_OUTPUT_PATH=${PWD}/output
      - WATCH_INTERVAL=60
      - WATCH_EMPLOYEE_NAME=Duane Hamilton
      - MAX_PARALLEL_REQUESTS=4
      # Email settings — fill in to enable "Send Report Now"
      - SMTP_HOST=
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASS=
      - SMTP_FROM=
      - EMAIL_TO=
      - EMAIL_SUBJECT=Weekly Reimbursement Report
